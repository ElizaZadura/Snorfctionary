<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snorfctionary | Defining the Undefinable</title>
    <meta name="description" content="A curated collection of unique words, whimsical definitions, and inspiring quotes.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <link rel="preload" as="image" href="media/logo-whiskers-left.png">
    <link rel="preload" as="image" href="media/logo-whiskers-right.png">
    <link rel="preload" as="image" href="media/logo-whiskers-alert.png">
    <link rel="icon" href="media/logo.png">
    <link rel="stylesheet" href="index.css">
</head>
<body>
<!-- deploy webhook test 2 2026-05-23 -->
    <header>
        <div class="container">
            <div class="logo-container">
                <img src="media/logo.png" alt="Snorfctionary Logo" id="main-logo" tabindex="0" role="button" aria-label="Snorfctionary logo. Click five times for suspicious cartography.">
            </div>
            <p class="tagline">Defining the Undefinable</p>
            <p class="snorf-secret header-secret" id="snorfigins-link" hidden>
                <a href="docs/snorfigins.html" title="Snorfigins">~/.snorfmap updated</a>
            </p>
        </div>
    </header>

    <main>
        <section id="dictionary">
            <div class="container">
                <div class="snorf-stage">
                    <div class="context-card context-index" id="context-index-card">
                        <span class="context-tab context-tab-teal"></span>
                        <strong>Oddly Sorted</strong>
                        <div class="case-list" id="case-list"></div>
                    </div>

                    <button type="button" class="context-card context-field-note" id="field-note-card">
                        <span class="context-tab context-tab-gold"></span>
                        <strong>Field Note</strong>
                        <span id="context-field-note"></span>
                        <em>Reroll note</em>
                    </button>

                    <button type="button" class="context-card context-artifact" id="artifact-card">
                        <span class="context-tab context-tab-rust"></span>
                        <strong>Artifact Slot</strong>
                        <span class="artifact-preview">?</span>
                        <span>Future image or suspicious visual evidence.</span>
                    </button>

                    <button type="button" class="context-card context-nearby" id="nearby-card">
                        <span class="context-tab context-tab-teal"></span>
                        <strong>Nearby Case</strong>
                        <span id="nearby-term"></span>
                        <em id="nearby-type"></em>
                    </button>

                    <div class="featured-term">
                    <article class="word-card featured-card" id="featured-term-card" tabindex="0">
                        <div class="term-meta">
                            <span class="word-type" id="term-type"></span>
                            <span class="term-counter" id="term-counter"></span>
                        </div>
                        <h3 id="term-word"></h3>
                        <p class="definition" id="term-definition"></p>
                        <p class="example" id="term-example"></p>
                        <p class="term-note" id="term-note" hidden></p>
                    </article>
                    <div class="term-controls" aria-label="Term navigation">
                        <button type="button" id="previous-term">Previous</button>
                        <button type="button" id="random-term">Random</button>
                        <button type="button" id="next-term">Next</button>
                    </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Snorfctionary. All rights reserved.</p>
        </div>
    </footer>

    <script src="index.js"></script>

</body>
</html>
